<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — AI Task Execution Agent</title>
    <meta name="description" content="Create your AI Task Execution Agent account.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>

<body>
    <!-- Background orbs -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="56" height="56" rx="16" fill="url(#logo-g)" />
                    <path d="M16 40V22L28 16L40 22V40L28 34L16 40Z" stroke="white" stroke-width="2.5"
                        stroke-linejoin="round" fill="none" />
                    <path d="M28 16V34" stroke="white" stroke-width="2.5" />
                    <circle cx="28" cy="25" r="3" fill="white" />
                    <defs>
                        <linearGradient id="logo-g" x1="0" y1="0" x2="56" y2="56">
                            <stop stop-color="#8B5CF6" />
                            <stop offset="1" stop-color="#3B82F6" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1>AI Task Execution Agent</h1>
            <p>Create your account to get started</p>
        </div>

        <!-- Auth card -->
        <div class="auth-card">
            <h2>Create account</h2>
            <p class="subtitle">Start executing tasks with AI guidance</p>

            <div class="auth-error" id="authError"></div>
            <div class="auth-success" id="authSuccess"></div>

            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="signupEmail">Email address</label>
                    <div class="input-wrapper">
                        <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="signupPassword" placeholder="Minimum 6 characters"
                            autocomplete="new-password" required minlength="6">
                        <button type="button" class="toggle-password"
                            onclick="togglePasswordVisibility('signupPassword', this)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupConfirm">Confirm password</label>
                    <div class="input-wrapper">
                        <input type="password" id="signupConfirm" placeholder="Re-enter your password"
                            autocomplete="new-password" required>
                        <button type="button" class="toggle-password"
                            onclick="togglePasswordVisibility('signupConfirm', this)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-auth" id="signupBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                        <circle cx="8.5" cy="7" r="4" />
                        <line x1="20" y1="8" x2="20" y2="14" />
                        <line x1="23" y1="11" x2="17" y2="11" />
                    </svg>
                    <span>Create Account</span>
                </button>
            </form>

            <div class="auth-divider">or</div>

            <div class="auth-footer">
                Already have an account? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>window.ENV = {{ env | tojson | safe }};</script>
    <script src="{{ url_for('static', filename='supabase-config.js') }}"></script>
    <script src="{{ url_for('static', filename='auth.js') }}"></script>
    <script>
        // Redirect to dashboard if already logged in
        redirectIfLoggedIn();
    </script>
</body>

</html>
